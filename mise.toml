[tools]
bun = "1.3"

[tasks.sync-api-docs-check]
description = "Check vendored Defold API fixtures for drift against the pinned ref-doc.zip"
dir = "{{config_root}}/packages/types"
run = "bun run sync-api-docs --check"

[tasks.current-version]
description = "Show the currently-published npm version of each workspace package"
run = """
#!/usr/bin/env bash
set -euo pipefail
for pkg in @defold-typescript/types @defold-typescript/transpiler @defold-typescript/cli; do
  version=$(bun pm view "$pkg" version 2>/dev/null || true)
  printf '%s\\t%s\\n' "$pkg" "${version:-(unpublished)}"
done
"""

[tasks.smoke]
description = "Advisory packed-install release smoke (network-touching, not a CI gate)"
run = "bun scripts/release-smoke.ts"

[tasks.registry-smoke]
description = "Advisory registry-install smoke — pulls the published @defold-typescript/cli from npm (network-touching, not a CI gate)"
run = "bun scripts/registry-smoke.ts"

[tasks.publish]
description = "Coordinated local npm publish (tags v<version> on success). Usage: mise run publish [<version>|patch|minor|major] [--publish] (dry-run without --publish)"
run = "bun scripts/publish.ts"

[tasks.release]
description = "Fallback: manually tag a version already published by `mise run publish`. Usage: mise run release <version>"
run = "bun scripts/release.ts"

[tasks.example-build]
description = "Compile the platformer example (docs/examples/platformer) once with the local working-tree CLI"
run = "bun packages/cli/src/bin.ts build docs/examples/platformer"

[tasks.example-watch]
description = "Watch and recompile the platformer example with the local working-tree CLI"
run = "bun packages/cli/src/bin.ts watch docs/examples/platformer"
