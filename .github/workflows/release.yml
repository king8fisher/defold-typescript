# PARKED — this workflow must not publish in its current form.
#
# Why: the gate installs with `--frozen-lockfile` (lockfile pinned at 0.0.0),
# stamps the manifests with `jq`, then packs. But `bun pm pack` rewrites
# `workspace:*` deps from the lockfile snapshot, NOT the live stamped manifest,
# so a release would publish e.g. `transpiler@<v>` depending on a nonexistent
# `types@0.0.0` — breaking every consumer install.
#
# Re-enable condition: regenerate the lockfile after the version stamp (so the
# pack picks up the coordinated sibling versions), then restore the real
# triggers and the `if: vars.ENABLE_NPM_PUBLISH == 'true'` publish step. Until
# then this is dispatch-only and fails loudly. The original job body is kept
# below as commented reference.

name: Release

on:
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Parked
        run: |
          echo "release.yml is PARKED — see the top-of-file comment." >&2
          echo "It cannot publish until the post-stamp lockfile is regenerated" >&2
          echo "and ENABLE_NPM_PUBLISH is intentionally flipped." >&2
          exit 1

