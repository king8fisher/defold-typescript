name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Semver to publish (e.g. 0.1.0), required for manual runs"
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3"

      - name: Resolve version
        shell: bash
        env:
          INPUT_VERSION: ${{ inputs.version }}
          REF_NAME: ${{ github.ref_name }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            VERSION="$INPUT_VERSION"
          else
            VERSION="$REF_NAME"
          fi
          VERSION="${VERSION#v}"
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid semver: $VERSION" >&2
            exit 1
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Gate — typecheck, lint, test
        run: |
          bun run typecheck
          bun run lint
          bun test

      - name: Stamp version across workspace
        shell: bash
        run: |
          for manifest in package.json packages/*/package.json; do
            jq --arg v "$VERSION" '.version = $v' "$manifest" > "$manifest.tmp"
            mv "$manifest.tmp" "$manifest"
          done

      - name: Publish (dry-run)
        run: |
          for pkg in types transpiler cli; do
            ( cd "packages/$pkg" && bun publish --dry-run --access public )
          done

      # Real publish is gated solely on the deliberate ENABLE_NPM_PUBLISH
      # human opt-in to the first release. The earlier blockers are resolved:
      # cli/transpiler ship node-runnable dist/ (types stays .ts-sourced for
      # the transpiler's runtime read), and bun pm pack rewrites workspace:*
      # to each sibling's stamped version — proven by the per-package
      # publish-deps.test.ts. Set the repository variable
      # ENABLE_NPM_PUBLISH=true to cut the first real release.
      - name: Publish to npm
        if: ${{ vars.ENABLE_NPM_PUBLISH == 'true' }}
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          for pkg in types transpiler cli; do
            ( cd "packages/$pkg" && bun publish --access public )
          done
